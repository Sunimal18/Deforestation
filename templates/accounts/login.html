{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>FOREST-AI Login</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<div class="overlay">

    <div class="login-card">

        <div class="logo-area">
            <img src="{% static 'images/logo.png' %}" alt="">
            <h1>FOREST-AI</h1>
            <p>Forest Monitoring System</p>
        </div>

        <h2>Login to FOREST-AI</h2>

        <form method="POST">
            {% csrf_token %}

            <label>Email / Username</label>
            <input type="text" name="username">

            <label>Password</label>
            <input type="password" name="password">

            <div class="forgot">
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit">
                Login
            </button>

        </form>

        <div class="footer-text">
            Powered by AI-driven forest conservation technology
        </div>

    </div>

</div>

</body>
</html>
