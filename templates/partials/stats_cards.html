<div class="stats-grid">

    <div class="stat-card">
        <h4>Total Disturbances</h4>
        <h2>{{ total_disturbances }}</h2>
        <p>Polygons detected</p>
    </div>

    <div class="stat-card">
        <h4>Total Area Affected</h4>
        <h2>{{ total_area_ha }} ha</h2>
        <p>Across all polygons</p>
    </div>

    <div class="stat-card">
        <h4>Avg Area</h4>
        <h2>{{ avg_area_ha }} ha</h2>
        <p>Per polygon</p>
    </div>

    <div class="stat-card">
        <h4>Max Area</h4>
        <h2>{{ max_area_ha }} ha</h2>
        <p>Largest polygon</p>
    </div>

</div>
