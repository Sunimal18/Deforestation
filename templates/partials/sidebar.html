<div class="sidebar">

    <h3>Layers</h3>

    <label>
        <input type="checkbox" id="layer-disturbance" checked>
        Disturbance
    </label>

    <label>
        <input type="checkbox" id="layer-risk" checked>
        Risk Prediction
    </label>

    <label>
        <input type="checkbox" id="layer-reforestation" checked>
        Reforestation
    </label>

    <h3>Time Range</h3>

    <div class="time-filter-row" style="display: flex; gap: 10px; margin-bottom: 15px;">
        <div style="flex: 1;">
            <label style="font-size: 12px; color: #6b7280; display: block; margin-bottom: 4px;">Start Year</label>
            <select id="filter-start-year" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px;">
                <option value="2010" selected>2010</option>
                <option value="2011">2011</option>
                <option value="2012">2012</option>
                <option value="2013">2013</option>
                <option value="2014">2014</option>
                <option value="2015">2015</option>
                <option value="2016">2016</option>
                <option value="2017">2017</option>
                <option value="2018">2018</option>
                <option value="2019">2019</option>
                <option value="2020">2020</option>
                <option value="2021">2021</option>
                <option value="2022">2022</option>
                <option value="2023">2023</option>
                <option value="2024">2024</option>
                <option value="2025">2025</option>
                <option value="2026">2026</option>
            </select>
        </div>
        <div style="flex: 1;">
            <label style="font-size: 12px; color: #6b7280; display: block; margin-bottom: 4px;">End Year</label>
            <select id="filter-end-year" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px;">
                <option value="2010">2010</option>
                <option value="2011">2011</option>
                <option value="2012">2012</option>
                <option value="2013">2013</option>
                <option value="2014">2014</option>
                <option value="2015">2015</option>
                <option value="2016">2016</option>
                <option value="2017">2017</option>
                <option value="2018">2018</option>
                <option value="2019">2019</option>
                <option value="2020">2020</option>
                <option value="2021">2021</option>
                <option value="2022">2022</option>
                <option value="2023">2023</option>
                <option value="2024">2024</option>
                <option value="2025">2025</option>
                <option value="2026" selected>2026</option>
            </select>
        </div>
    </div>

    <label style="font-size: 12px; color: #6b7280; display: block; margin-bottom: 4px;">Slider End Year: <span id="slider-value" style="font-weight: 600; color: #111827;">2026</span></label>
    <input type="range" id="filter-year-slider" min="2010" max="2026" value="2026" style="width: 100%; margin-top: 5px;">

</div>
